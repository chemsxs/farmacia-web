<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Productos - Farmacia El Descuento Jossy</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Segoe UI',sans-serif;
background:#f1f9ff;
color:#1e293b;
}

header{
background:#0ea5e9;
color:white;
padding:20px;
text-align:center;
}

nav{
background:#0284c7;
padding:12px;
text-align:center;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:600;
}

.banner{
background:linear-gradient(135deg,#0ea5e9,#38bdf8);
color:white;
text-align:center;
padding:60px 20px;
}

.container{
padding:40px;
max-width:1200px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
overflow:hidden;
transition:0.3s;
animation:fadeUp 0.6s ease forwards;
opacity:0;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-content{
padding:20px;
text-align:center;
}

.card h3{
margin-bottom:8px;
font-size:18px;
}

.price{
color:#0ea5e9;
font-weight:bold;
font-size:18px;
margin:10px 0;
}

button{
background:#0ea5e9;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#0284c7;
}

footer{
background:#0284c7;
color:white;
text-align:center;
padding:15px;
margin-top:40px;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
font-size:22px;
text-decoration:none;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(40px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<header>
<h2>Farmacia El Descuento Jossy 💊</h2>
</header>

<nav>
<a href="index.html">Inicio</a>
<a href="productos.html">Productos</a>
<a href="contacto.html">Contacto</a>
</nav>

<div class="banner">
<h1>Nuestros Medicamentos</h1>
<p>Calidad y buenos precios para tu salud</p>
</div>

<div class="container">

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1587854692152-cbe660dbde88">
<div class="card-content">
<h3>Paracetamol 500mg</h3>
<p class="price">$2.50</p>
<button onclick="consultar('Paracetamol 500mg')">Consultar disponibilidad</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1588776814546-1ffcf47267a5">
<div class="card-content">
<h3>Ibuprofeno 400mg</h3>
<p class="price">$3.00</p>
<button onclick="consultar('Ibuprofeno 400mg')">Consultar disponibilidad</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1607619056574-7b8d3ee536b2">
<div class="card-content">
<h3>Vitamina C</h3>
<p class="price">$5.00</p>
<button onclick="consultar('Vitamina C')">Consultar disponibilidad</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1600959907703-125ba1374a12">
<div class="card-content">
<h3>Jarabe Infantil</h3>
<p class="price">$4.25</p>
<button onclick="consultar('Jarabe Infantil')">Consultar disponibilidad</button>
</div>
</div>

</div>

</div>

<footer>
© 2026 Farmacia El Descuento Jossy
</footer>

<a class="whatsapp" href="https://wa.me/TU_NUMERO_AQUI" target="_blank">💬</a>

<script>
function consultar(producto){
let numero="0981689854";
let mensaje="Hola, quisiera consultar disponibilidad de: "+producto;
window.open("https://wa.me/"+numero+"?text="+encodeURIComponent(mensaje));
}
</script>

</body>
</html>
