<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Productos - Farmacia El Descuento Jossy</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f1f8f4;
transition:0.3s;
}

.dark{
background:#1c1c1c;
color:white;
}

header{
background:#2e7d32;
color:white;
padding:20px;
text-align:center;
}

nav{
background:#1b5e20;
padding:12px;
text-align:center;
}

nav a{
color:white;
margin:15px;
text-decoration:none;
font-weight:bold;
}

.search-bar{
text-align:center;
padding:20px;
}

.search-bar input{
padding:10px;
width:60%;
max-width:400px;
border-radius:5px;
border:1px solid #ccc;
}

.categories{
text-align:center;
margin-bottom:20px;
}

.categories button{
margin:5px;
padding:8px 15px;
border:none;
background:#a5d6a7;
cursor:pointer;
border-radius:20px;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}

.card{
background:white;
width:230px;
padding:15px;
border-radius:12px;
box-shadow:0 6px 12px rgba(0,0,0,0.1);
text-align:center;
transition:0.3s;
position:relative;
}

.dark .card{
background:#2a2a2a;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:8px;
}

.price{
color:#2e7d32;
font-weight:bold;
font-size:18px;
}

.offer{
position:absolute;
top:10px;
left:10px;
background:red;
color:white;
padding:5px 8px;
font-size:12px;
border-radius:5px;
}

button{
background:#2e7d32;
color:white;
border:none;
padding:8px 12px;
border-radius:5px;
cursor:pointer;
margin-top:10px;
}

.toggle{
position:fixed;
top:20px;
right:20px;
background:black;
color:white;
padding:8px 12px;
border-radius:20px;
cursor:pointer;
}

footer{
background:#2e7d32;
color:white;
text-align:center;
padding:15px;
margin-top:40px;
}
</style>
</head>

<body>

<div class="toggle" onclick="toggleMode()">🌙 Modo Oscuro</div>

<header>
<h1>Productos</h1>
</header>

<nav>
<a href="index.html">Inicio</a>
<a href="productos.html">Productos</a>
<a href="contacto.html">Contacto</a>
</nav>

<div class="search-bar">
<input type="text" id="searchInput" placeholder="Buscar medicamento...">
</div>

<div class="categories">
<button onclick="filter('all')">Todos</button>
<button onclick="filter('dolor')">Dolor</button>
<button onclick="filter('vitaminas')">Vitaminas</button>
<button onclick="filter('bebes')">Bebés</button>
</div>

<div class="products" id="productList">

<div class="card" data-category="dolor">
<div class="offer">OFERTA</div>
<img src="https://images.unsplash.com/photo-1587854692152-cbe660dbde88">
<h3>Paracetamol</h3>
<p>Alivia dolor y fiebre</p>
<p class="price">$2.50</p>
<button onclick="consultar('Paracetamol')">Consultar disponibilidad</button>
</div>

<div class="card" data-category="dolor">
<img src="https://images.unsplash.com/photo-1588776814546-1ffcf47267a5">
<h3>Ibuprofeno</h3>
<p>Antiinflamatorio</p>
<p class="price">$3.00</p>
<button onclick="consultar('Ibuprofeno')">Consultar disponibilidad</button>
</div>

<div class="card" data-category="vitaminas">
<img src="https://images.unsplash.com/photo-1607619056574-7b8d3ee536b2">
<h3>Vitamina C</h3>
<p>Refuerza defensas</p>
<p class="price">$5.00</p>
<button onclick="consultar('Vitamina C')">Consultar disponibilidad</button>
</div>

<div class="card" data-category="bebes">
<img src="https://images.unsplash.com/photo-1600959907703-125ba1374a12">
<h3>Jarabe Infantil</h3>
<p>Para niños</p>
<p class="price">$4.25</p>
<button onclick="consultar('Jarabe Infantil')">Consultar disponibilidad</button>
</div>

</div>

<footer>
Farmacia El Descuento Jossy
</footer>

<script>

function filter(category){
let cards = document.querySelectorAll('.card');
cards.forEach(card=>{
if(category === 'all' || card.dataset.category === category){
card.style.display = 'block';
}else{
card.style.display = 'none';
}
});
}

document.getElementById("searchInput").addEventListener("keyup", function(){
let value = this.value.toLowerCase();
let cards = document.querySelectorAll(".card");
cards.forEach(card=>{
card.style.display = card.textContent.toLowerCase().includes(value)
? "block"
: "none";
});
});

function toggleMode(){
document.body.classList.toggle("dark");
}

function consultar(producto){
let numero = "TU_NUMERO_AQUI";
let mensaje = "Hola, quisiera consultar si tienen disponible el producto: " + producto;
let url = "https://wa.me/" + numero + "?text=" + encodeURIComponent(mensaje);
window.open(url, "_blank");
}

</script>

</body>
</html>
