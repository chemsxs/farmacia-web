<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Productos - Farmacia El Descuento Jossy</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:'Segoe UI',sans-serif;
background:#f8fbff;
}

header{background:#0ea5e9;color:white;padding:20px;text-align:center;}
nav{background:#0284c7;padding:12px;text-align:center;}
nav a{color:white;margin:0 15px;text-decoration:none;font-weight:600;}

.container{padding:30px;}

.search{text-align:center;margin-bottom:25px;}
.search input{
padding:10px;
width:60%;
max-width:400px;
border-radius:6px;
border:1px solid #cbd5e1;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:16px;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
transition:0.3s;
animation:fadeUp 0.6s ease forwards;
opacity:0;
}

.card:hover{
transform:translateY(-6px);
}

.price{color:#0ea5e9;font-weight:bold;margin:8px 0;}

button{
background:#0ea5e9;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#0284c7;
}

footer{
background:#0284c7;
color:white;
text-align:center;
padding:15px;
margin-top:40px;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
text-decoration:none;
font-size:22px;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<header>
<h2>Medicamentos Disponibles</h2>
</header>

<nav>
<a href="index.html">Inicio</a>
<a href="productos.html">Productos</a>
<a href="contacto.html">Contacto</a>
</nav>

<div class="container">

<div class="search">
<input type="text" id="buscador" placeholder="Buscar medicamento...">
</div>

<div class="grid" id="lista"></div>

</div>

<footer>
© 2026 Farmacia El Descuento Jossy
</footer>

<a class="whatsapp" href="https://wa.me/TU_NUMERO_AQUI" target="_blank">💬</a>

<script>
let medicamentos=[
"Paracetamol","Ibuprofeno","Amoxicilina","Vitamina C","Vitamina B12",
"Loratadina","Omeprazol","Diclofenaco","Antigripal","Melatonina",
"Ácido Fólico","Aspirina","Calcio","Suero Oral","Insulina",
"Alcohol","Termómetro","Gel Antibacterial","Jarabe Infantil"
];

let contenedor=document.getElementById("lista");

function mostrar(lista){
contenedor.innerHTML="";
lista.forEach((med,i)=>{
setTimeout(()=>{
contenedor.innerHTML+=`
<div class="card">
<h3>${med}</h3>
<p class="price">Consultar precio</p>
<button onclick="consultar('${med}')">Consultar</button>
</div>`;
},i*50);
});
}

mostrar(medicamentos);

document.getElementById("buscador").addEventListener("keyup",function(){
let texto=this.value.toLowerCase();
let filtrados=medicamentos.filter(m=>m.toLowerCase().includes(texto));
mostrar(filtrados);
});

function consultar(producto){
let numero="0981689854";
let mensaje="Hola, quisiera consultar disponibilidad de: "+producto;
window.open("https://wa.me/"+numero+"?text="+encodeURIComponent(mensaje));
}
</script>

</body>
</html>
